apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-lab

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-lab

  template:
    metadata:
      labels:
        app: devops-lab

    spec:
      containers:
      - name: app
        image: tuusuario/devops-lab:latest

        ports:
        - containerPort: 3000