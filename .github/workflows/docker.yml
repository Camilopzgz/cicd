name: Docker Image Build & Push

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'Dockerfile'
      - 'app.js'
      - 'taskManager.js'
      - 'validators.js'
      - 'server.js'
      - 'package*.json'
      - '.github/workflows/docker.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extraer version
      id: version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

    - name: conversion a lowercase
      id: repo
      run: echo "REPO_LC=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: configurar QEMU
      uses: docker/setup-qemu-action@v3

    - name: configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extraer metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ env.REPO_LC }}/devops-lab
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}},value=${{ env.VERSION }}
          type=raw,value=${{ env.VERSION }}
          type=sha,prefix=commit-
          type=raw,value=develop-latest

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/devops-lab:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LC }}/devops-lab:buildcache,mode=max
        platforms: linux/amd64,linux/arm64